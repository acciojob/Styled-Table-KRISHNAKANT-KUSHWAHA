<!DOCTYPE html>
<html>
<head>
    <title>CBSE Result Sheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #d6eaf8;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <h2>CBSE Result Sheet</h2>

    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <th>Marks Obtained</th>
                <th>Maximum Marks</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Mathematics</td>
                <td>95</td>
                <td>100</td>
                <td>A1</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>92</td>
                <td>100</td>
                <td>A1</td>
            </tr>
            <tr>
                <td>English</td>
                <td>88</td>
                <td>100</td>
                <td>A2</td>
            </tr>
            <tr>
                <td>Social Science</td>
                <td>90</td>
                <td>100</td>
                <td>A1</td>
            </tr>
            <tr>
                <td>Computer Science</td>
                <td>98</td>
                <td>100</td>
                <td>A1</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
